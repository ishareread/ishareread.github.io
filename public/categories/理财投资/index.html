<!doctype html><html><head><title>理财投资</title><meta charset=utf-8></head><body><h1>理财投资</h1><article><h2><a href=https://www.ishareread.com/p/%E6%B2%B9%E4%BB%B7%E5%8F%88%E9%99%8D%E4%BA%86%E5%8A%A0%E6%BB%A1%E4%B8%80%E7%AE%B1%E7%9C%8120%E5%9D%97%E4%BD%86%E7%9C%9F%E6%AD%A3%E8%AF%A5%E9%AB%98%E5%85%B4%E7%9A%84%E4%B8%8D%E6%98%AF%E8%BD%A6%E4%B8%BB%E8%80%8C%E6%98%AF%E4%BC%9A%E6%8A%95%E8%B5%84%E7%9A%84%E4%BA%BA/>油价又降了，加满一箱省20块——但真正该高兴的不是车主，而是会投资的人</a></h2><h2 id=油价又降了加满一箱省20块但真正该高兴的不是车主而是会投资的人>油价又降了，加满一箱省20块——但真正该高兴的不是车主，而是会投资的人</h2><p>昨天加油的时候，加油站大姐跟我说：&ldquo;今天24点要降价了，要不明天再来？&rdquo;</p><p>92号汽油每升降了0.4元，95号降了0.43元，加满一箱50升的油，能省20块左右。6月4日刚降过一次，这是半个月内的第二次降价。</p></article></body></html>
