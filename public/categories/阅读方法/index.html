<!doctype html><html><head><title>阅读方法</title><meta charset=utf-8></head><body><h1>阅读方法</h1><article><h2><a href=https://www.ishareread.com/p/%E4%B8%BA%E4%BB%80%E4%B9%88%E4%BD%A0%E8%AF%BB%E4%BA%86%E5%BE%88%E5%A4%9A%E6%88%90%E9%95%BF%E4%B9%A6%E5%8D%B4%E4%BE%9D%E7%84%B6%E8%BF%87%E4%B8%8D%E5%A5%BD%E8%BF%99%E4%B8%80%E7%94%9F/>为什么你读了很多成长书，却依然过不好这一生？</a></h2><h3 id=为什么你读了很多成长书却依然过不好这一生>为什么你读了很多成长书，却依然过不好这一生？</h3><p>你有没有过这样的经历，书架上摆满了各类成长书籍，每次看到新书都忍不住买买买，觉得这就是自己走向成功的秘籍。可当你一本本读完，却发现生活并没有多大改变，还是在原地打转。每天忙碌地读着书，以为知识装进脑袋就能改变命运，结果却不尽人意，这是不是让你很苦恼？其实，这背后藏着一些我们没意识到的问题。今天，我就给大家推荐几本书，说不定能帮你解开这个谜团。</p></article></body></html>
