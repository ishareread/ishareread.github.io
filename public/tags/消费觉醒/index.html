<h1>消费觉醒</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E4%BB%80%E4%B9%88%E9%83%BD%E4%B8%8D%E6%83%B3%E4%B9%B0%E7%9A%84%E6%97%B6%E4%BB%A3%E6%88%91%E4%BB%AC%E5%88%B0%E5%BA%95%E9%9C%80%E8%A6%81%E4%BB%80%E4%B9%88/">「什么都不想买」的时代，我们到底需要什么？</a></h2>
<p>你有没有这种感觉——</p>
<p>打开购物APP，划了半天，什么都没加购物车。</p>
<p>以前那种&quot;不买就亏了&quot;的紧迫感，现在突然消失了。直播间再热闹，你也只是看一眼就走；618、双11的倒计时，对你来说只是一个普通的周四；超市促销员的喇叭震天响，你头也不回地走过去。</p>
