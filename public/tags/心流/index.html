<h1>心流</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E4%B8%BA%E4%BB%80%E4%B9%88%E5%B9%B4%E8%BD%BB%E4%BA%BA%E5%BC%80%E5%A7%8B%E7%88%B1%E4%B8%8A%E7%8B%AC%E5%B1%85%E4%BA%86/">为什么年轻人开始爱上独居了？</a></h2>
<p>前几天刷到一个帖子，评论区炸了。</p>
<p>一个姑娘发帖说，她30岁，独居5年，每天早上6点起床看书、做饭、健身，下班回家就关上门追剧撸猫，周末约朋友吃饭逛街，小日子过得有滋有味。底下一半人羡慕嫉妒恨：&ldquo;这才是理想生活啊！&ldquo;另一半人苦口婆心：&ldquo;一个人多孤独啊，生病了怎么办？老了怎么办？不结婚不生孩子以后谁管你？&rdquo;</p>
