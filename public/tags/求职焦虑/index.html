<!doctype html><html><head><title>求职焦虑</title><meta charset=utf-8></head><body><h1>求职焦虑</h1><article><h2><a href=https://www.ishareread.com/posts/2026-06-28-%E6%AF%95%E4%B8%9A%E5%AD%A3%E6%B1%82%E8%81%8C-%E7%BB%83%E4%B9%A0%E7%9A%84%E5%BF%83%E6%80%81/>毕业季1290万人求职热：为什么"慢慢来"反而是最快的方式</a></h2><h1 id=毕业季1290万人求职热为什么慢慢来反而是最快的方式>毕业季1290万人求职热：为什么"慢慢来"反而是最快的方式</h1><p>每年六七月，朋友圈里都会出现两种截然不同的状态。一种是企业HR在疯狂刷简历，感叹"怎么招不到合适的人"；另一种是应届毕业生在焦虑地投简历，感叹"怎么找不到合适的工作"。</p></article></body></html>
