<!doctype html><html><head><title>AI安全</title><meta charset=utf-8></head><body><h1>AI安全</h1><article><h2><a href=https://www.ishareread.com/p/%E8%8B%B1%E5%A4%AE%E8%A1%8C%E7%B4%A7%E6%80%A5%E6%B5%8B%E8%AF%95ai%E9%87%91%E8%9E%8D%E9%A3%8E%E9%99%A9claude-opus-4.7%E5%8F%91%E5%B8%83%E4%B8%BA%E4%BB%80%E4%B9%88%E8%BF%99%E6%9C%AC%E4%B9%A6%E6%98%AF%E7%90%86%E8%A7%A3ai%E5%AE%89%E5%85%A8%E7%9A%84%E5%85%B3%E9%94%AE/>英央行紧急测试AI金融风险、Claude Opus 4.7发布——为什么这本书是理解AI安全的关键？</a></h2><p>你有没有想过一个问题：<strong>当AI比人类更懂金融的时候，谁来管住它？</strong></p><p>就在上周，两件大事同时发生，让这个问题变得前所未有的紧迫：</p><p><strong>第一件事</strong>：4月16日，Anthropic发布Claude Opus 4.7——全球首个把"安全可控"当作核心卖点的顶级AI模型。它在发布会上明明白白地告诉你：&ldquo;我们刻意降低了它发起网络攻击的能力。&rdquo;</p></article></body></html>
