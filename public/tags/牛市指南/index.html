<!doctype html><html><head><title>牛市指南</title><meta charset=utf-8></head><body><h1>牛市指南</h1><article><h2><a href=https://www.ishareread.com/p/%E5%88%9B%E4%B8%9A%E6%9D%BF%E6%8C%87%E5%88%9B%E5%8D%81%E5%B9%B4%E6%96%B0%E9%AB%98%E7%AE%97%E5%8A%9B%E6%9D%BF%E5%9D%97%E7%96%AF%E6%B6%A8%E7%89%9B%E5%B8%82%E6%9D%A5%E4%BA%86%E6%99%AE%E9%80%9A%E4%BA%BA%E8%AF%A5%E6%80%8E%E4%B9%88%E5%81%9A/>创业板指创十年新高、算力板块疯涨：牛市来了，普通人该怎么做？</a></h2><h2 id=一当菜市场大妈都在聊股票>一、当菜市场大妈都在聊股票</h2><p>你有没有发现，最近周围的人突然都开始聊股票了？</p><p>电梯里，同事在说"创业板今天又涨了多少点"；朋友圈里，久不联系的老同学晒出了涨停截图；甚至你妈打来电话，问你"现在买基金还来得及吗"。</p></article></body></html>
