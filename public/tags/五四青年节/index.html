<!doctype html><html><head><title>五四青年节</title><meta charset=utf-8></head><body><h1>五四青年节</h1><article><h2><a href=https://www.ishareread.com/p/%E4%BA%94%E5%9B%9B%E9%9D%92%E5%B9%B4%E8%8A%82%E7%BB%99%E5%88%9A%E5%B7%A5%E4%BD%9C%E7%9A%84%E4%BD%A0%E4%B8%80%E4%BB%BD%E8%81%8C%E5%9C%BA%E6%B2%9F%E9%80%9A%E9%81%BF%E5%9D%91%E4%B9%A6%E5%8D%95/>五四青年节：给刚工作的你，一份职场沟通避坑书单</a></h2><p>今天是五四青年节，属于每一个在职场中奋斗的年轻人。</p><p>共青团员有7833.6万名，而你，可能就是其中之一。</p><p>一百多年前，五四运动的那批年轻人，用热血和行动改变了中国的命运；今天，我们这一代年轻人，正在用自己的方式，在职场这个没有硝烟的战场上，打拼属于我们的未来。</p></article></body></html>
