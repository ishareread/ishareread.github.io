<!doctype html><html><head><title>中国足球</title><meta charset=utf-8></head><body><h1>中国足球</h1><article><h2><a href=https://www.ishareread.com/p/%E4%BB%8E%E6%9E%81%E7%AE%80%E6%AC%A7%E6%B4%B2%E5%8F%B2%E7%9C%8B%E7%AB%9E%E6%8A%80%E7%B2%BE%E7%A5%9E%E9%80%86%E8%BD%AC%E8%83%8C%E5%90%8E%E7%9A%84%E6%96%87%E6%98%8E%E5%9F%BA%E5%9B%A0%E4%B8%8E%E4%BD%93%E8%82%B2%E4%BC%A0%E6%89%BF/>从《极简欧洲史》看竞技精神：逆转背后的文明基因与体育传承</a></h2><h2 id=一3-1逆转沙特这不仅仅是一场足球赛>一、3-1逆转沙特：这不仅仅是一场足球赛</h2><p>5月16日凌晨，吉达阿卜杜拉国王体育城，整个中国都为一群17岁的少年沸腾了。</p><p>0-1落后，被东道主围攻，前两届都输给了同一个对手——换作是你，你会不会慌？但这群中国少年没有。第27分钟，邝兆镭右路突破传中，万项禁区内冷静扣球，推射破门，1-1扳平。第59分钟，何思凡头球回做，赵松源垫射反超，2-1。补时第2分钟，何思凡连过两人，一记爆射打中横梁内侧入网，3-1锁定胜局。</p></article></body></html>
