<!doctype html><html><head><title>航天精神</title><meta charset=utf-8></head><body><h1>航天精神</h1><article><h2><a href=https://www.ishareread.com/p/%E8%88%AA%E5%A4%A9%E5%91%98%E9%A3%9E%E5%A4%A9%E8%83%8C%E5%90%8E%E7%9A%84%E6%95%85%E4%BA%8B%E8%AF%BB%E5%AE%8C%E6%88%91%E6%98%8E%E7%99%BD%E4%BA%86%E4%BB%80%E4%B9%88%E5%8F%AB%E5%BB%B6%E8%BF%9F%E6%BB%A1%E8%B6%B3/>航天员飞天背后的故事，读完我明白了什么叫“延迟满足”</a></h2><h2 id=一个让人心酸的数据>一个让人心酸的数据</h2><p>2026年，中国航天事业迎来创建70周年。</p><p>70年，从“东方红一号”到空间站遨游苍穹，从探月取壤到火星探测，中国航天创造了一个又一个奇迹。</p><p>但今天这篇文章，我不想讲那些宏大的成就。我想讲几个普通人的故事。</p></article></body></html>
