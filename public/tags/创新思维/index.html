<!doctype html><html><head><title>创新思维</title><meta charset=utf-8></head><body><h1>创新思维</h1><article><h2><a href=https://www.ishareread.com/p/%E8%A2%ABai%E5%AE%A3%E5%88%A4%E6%AD%BB%E5%88%91%E7%9A%84%E4%BC%A0%E7%BB%9F%E8%BD%AF%E4%BB%B6%E4%BB%8E%E4%B8%9A%E8%80%85%E8%BF%99%E6%9C%AC%E4%B9%A6%E4%B9%9F%E8%AE%B8%E6%98%AF%E6%95%91%E5%91%BD%E7%A8%BB%E8%8D%89/>被AI"宣判死刑"的传统软件从业者，这本书也许是救命稻草</a></h2><p>你有多久没更新过简历了？</p><p>如果你是程序员、产品经理、软件测试工程师，或者是任何在传统软件行业工作的从业者，这个问题可能会让你心里咯噔一下。</p><p>不是不想更新，是不知道该写什么。</p></article><article><h2><a href=https://www.ishareread.com/p/%E5%BA%93%E5%85%8B%E9%80%80%E4%BC%91%E4%B9%94%E5%B8%83%E6%96%AF%E9%81%97%E4%BA%A7%E8%90%BD%E5%B9%95%E8%BF%99%E5%AE%B6%E5%85%AC%E5%8F%B8%E5%87%AD%E4%BB%80%E4%B9%88%E6%B4%BB%E4%BA%8650%E5%B9%B4%E8%BF%98%E5%9C%A8%E6%94%B9%E5%8F%98%E4%B8%96%E7%95%8C/>库克退休、乔布斯遗产落幕：这家公司凭什么活了50年还在改变世界？</a></h2><p>2026年4月21日，苹果公司宣布了一条震动全球科技圈的消息：<strong>蒂姆·库克将于9月1日正式卸任CEO，转任执行董事长。</strong> 接过帅印的，是已经在苹果工作25年的硬件工程高级副总裁约翰·特纳斯（John Ternus）。</p></article></body></html>
