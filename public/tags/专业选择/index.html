<!doctype html><html><head><title>专业选择</title><meta charset=utf-8></head><body><h1>专业选择</h1><article><h2><a href=https://www.ishareread.com/posts/2025-07-01-innovator-dilemma-major-choice/>计算机专业遇冷、法学分数逆势大涨：从《创新者的窘境》看为什么越热门的专业越危险</a></h2><p>你有没有这种感觉：选专业就像炒股票，你以为是抄底，结果抄在了山腰；你以为追的是风口，结果风停了才发现自己站在风眼里。</p><p>去年这时候，我一个朋友家的孩子，分数够上985的计算机专业，全家激动得差点放鞭炮。报志愿的时候，孩子他爸拍着胸脯说：&ldquo;学计算机！互联网大厂，年薪30万起步，妥妥的！&rdquo;</p></article></body></html>
