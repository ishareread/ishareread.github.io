<h1>思维模型</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E9%A9%AC%E6%96%AF%E5%85%8B%E8%B4%9D%E4%BD%90%E6%96%AF%E9%83%BD%E5%9C%A8%E7%94%A8%E7%9A%84%E6%80%9D%E7%BB%B4%E6%A8%A1%E5%9E%8B%E8%97%8F%E5%9C%A8%E8%BF%99%E6%9C%AC8.5%E5%88%86%E7%A5%9E%E4%BD%9C%E9%87%8C/">马斯克、贝佐斯都在用的思维模型，藏在这本8.5分神作里</a></h2>
<p>你有没有过这样的经历？</p>
<p>刷到一条&quot;马斯克又放大招&quot;的热搜，激动地点进去，发现自己完全看不懂他在说什么；</p>
<p>听到贝佐斯、芒格这些大佬张口闭口&quot;第一性原理&quot;&ldquo;长期主义&rdquo;，点头称是却一头雾水；</p>
</article>

<article>
<h2><a href="https://www.ishareread.com/p/%E8%BF%99%E6%9C%AC%E8%A2%AB%E7%BF%BB%E8%AF%91%E6%88%9040%E7%A7%8D%E8%AF%AD%E8%A8%80%E7%9A%84%E4%B9%A690%E7%9A%84%E4%BA%BA%E5%8F%AA%E8%AF%BB%E6%87%82%E4%BA%86%E7%AC%AC%E4%B8%80%E5%B1%82/">这本被翻译成40种语言的书，90%的人只读懂了第一层</a></h2>
<p>你有没有过这种感觉——</p>
<p>明明读完了整本书，合上之后却发现：书里到底说了什么？我好像懂，又好像没懂。</p>
<p>这太正常了。</p>
<p>今天我想跟你聊聊一本书，《思考，快与慢》。它被翻译成40多种语言，常年霸占各类读书榜单的TOP位置，作者丹尼尔·卡尼曼还拿过诺贝尔经济学奖。</p>
</article>
