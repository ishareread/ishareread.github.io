<h1>财务造假</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E8%AF%81%E7%9B%91%E4%BC%9A%E9%87%8D%E6%8B%B3%E5%87%BA%E5%87%BB%E8%B4%A2%E5%8A%A1%E9%80%A0%E5%81%87%E8%AF%BB%E6%87%82%E8%BF%993%E6%9C%AC%E7%90%86%E8%B4%A2%E4%B9%A6%E5%B0%91%E8%B8%A9%E5%9D%91/">证监会重拳出击财务造假！读懂这3本理财书少踩坑</a></h2>
<p>5月8日，证监会一口气开出两张重磅罚单：元道通信和清越科技因IPO阶段即开始财务造假，分别被处以2.39亿和1.73亿元罚款，两家公司均已锁定退市。这是证监会4月24日部署2026年打击和防范上市公司财务造假专项行动以来，首批落地的标志性案件。</p>
</article>

<article>
<h2><a href="https://www.ishareread.com/p/%E8%AF%81%E7%9B%91%E4%BC%9A%E9%87%8D%E6%8B%B3%E6%89%93%E5%87%BB%E8%B4%A2%E5%8A%A1%E9%80%A0%E5%81%87%E8%AF%BB%E6%87%82%E8%B4%A2%E6%8A%A5%E4%B8%BA%E4%BB%80%E4%B9%88%E6%98%AF%E6%88%90%E5%B9%B4%E4%BA%BA%E7%9A%84%E5%BF%85%E4%BF%AE%E8%AF%BE/">证监会重拳打击财务造假：读懂财报为什么是成年人的必修课？</a></h2>
<hr>
<p>4月24日，证监会扔出一颗重磅炸弹：2026年打击和防范上市公司财务造假专项行动正式启动。</p>
<p>这是继2024年新“国九条”发布以来的<strong>第三轮</strong>专项行动。</p>
</article>
