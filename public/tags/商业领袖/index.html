<!doctype html><html><head><title>商业领袖</title><meta charset=utf-8></head><body><h1>商业领袖</h1><article><h2><a href=https://www.ishareread.com/p/%E5%BA%93%E5%85%8B%E9%80%80%E4%BC%91%E8%BF%99%E5%A0%82%E8%AF%BE%E4%B8%BA%E4%BB%80%E4%B9%88%E5%9F%BA%E4%B8%9A%E9%95%BF%E9%9D%92%E6%AF%94%E6%88%90%E4%B8%BA%E9%A6%96%E5%AF%8C%E6%9B%B4%E9%9A%BE/>库克退休这堂课：为什么基业长青比成为首富更难？</a></h2><p>4月21日，苹果官宣了一条震动全球科技圈的消息：执掌苹果15年的蒂姆·库克，将于今年9月正式卸任CEO，转任董事会执行董事长。硬件工程高级副总裁约翰·特努斯接棒，成为苹果第八任CEO。</p></article></body></html>
