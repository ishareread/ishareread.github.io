<p style=" text-align: left; line-height: 1.75; font-family: -apple-system-font,BlinkMacSystemFont, Helvetica Neue, PingFang SC, Hiragino Sans GB , Microsoft YaHei UI , Microsoft YaHei ,Arial,sans-serif; font-size: 16px; margin: 1.5em 8px; letter-spacing: 0.1em; color: #333">上周末，我和几个朋友约着看了一场世界杯小组赛。开场前，大家还在聊工作、聊房贷、聊孩子上学的烦恼，但当主裁判一声哨响，所有人都像变了个人似的——眼睛盯着屏幕，呼吸跟着球的轨迹起伏，进球时拍桌子欢呼，失球时懊恼得直拍大腿。</p>
