<!doctype html><html><head><title>足球</title><meta charset=utf-8></head><body><h1>足球</h1><article><h2><a href=https://www.ishareread.com/p/%E7%94%B7%E8%B6%B3%E6%97%B6%E9%9A%9422%E5%B9%B4%E9%97%AF%E5%85%A5%E5%86%B3%E8%B5%9B%E5%8D%93%E6%9C%89%E6%88%90%E6%95%88%E4%B8%8D%E6%98%AF%E5%A4%A9%E8%B5%8B%E6%98%AF%E6%96%B9%E6%B3%95%E8%AE%BA/>男足时隔22年闯入决赛：卓有成效不是天赋，是方法论</a></h2><p>凌晨一点，无数人守在屏幕前，等一个结果。</p><p>上半场0比3，弹幕里已经有人在刷“熟悉的剧本”“又崩了”。但下半场哨响，一切都变了——小伙子们连追两球，最终2比3惜败日本，拿下U17亚洲杯亚军。</p></article></body></html>
