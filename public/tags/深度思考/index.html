<h1>深度思考</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E6%8C%AA%E5%A8%81%E5%B0%8F%E5%AD%A6%E7%A6%81%E7%94%A8ai/">一个国家宣布小学生禁用AI：当思考变成奢侈品，我们该怎么办</a></h2>
<p>周末刷到一条新闻，我愣了好几秒。</p>
<p>挪威政府宣布：从今年8月开始，全国小学1到7年级全面禁止使用生成式AI。首相斯特勒说得更直白——学校首要任务是培养孩子的阅读、写作和数学能力，&ldquo;如果没有批判性地使用AI，孩子会跳过学习过程中的关键步骤&rdquo;。</p>
</article>

<article>
<h2><a href="https://www.ishareread.com/p/ai%E6%97%B6%E4%BB%A3%E7%9A%84%E8%AE%A4%E7%9F%A5%E5%8D%87%E7%BA%A7%E5%BD%93%E7%9C%BC%E8%A7%81%E4%B8%BA%E5%AE%9E%E6%88%90%E4%B8%BA%E8%BF%87%E5%8E%BB%E6%97%B6/">AI时代的认知升级：当眼见为实成为过去时</a></h2>
<p>你有多久没有怀疑过自己看到的东西了？</p>
<p>前几天，我朋友圈被一张图刷屏了：一位穿着考究的中年男士站在写字楼落地窗前，手里端着一杯咖啡，窗外是璀璨的城市夜景。配文写着&quot;35岁，终于活成了自己想要的样子&quot;。</p>
</article>
