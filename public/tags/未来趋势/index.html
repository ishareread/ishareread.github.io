<!doctype html><html><head><title>未来趋势</title><meta charset=utf-8></head><body><h1>未来趋势</h1><article><h2><a href=https://www.ishareread.com/p/%E5%BD%93ai%E5%BC%80%E5%A7%8B%E6%80%9D%E8%80%83google%E8%AF%B4agi%E4%B8%8D%E6%98%AF%E7%BB%88%E7%82%B9%E9%87%8D%E8%AF%BB%E5%A5%87%E7%82%B9%E4%B8%B4%E8%BF%91%E6%88%91%E5%90%8E%E8%83%8C%E5%8F%91%E5%87%89%E5%8F%88%E7%83%AD%E8%A1%80%E6%B2%B8%E8%85%BE/>当AI开始思考：Google说AGI不是终点，重读《奇点临近》我后背发凉又热血沸腾</a></h2><h2 id=一条让你后背发凉的新闻>一条让你"后背发凉"的新闻</h2><p>2026年6月16日，Google DeepMind发布了一份研究报告，标题翻译过来大概是——<strong>《迈向ASI：真正的AI进步才刚开始》</strong>。</p><p>注意，不是AGI（通用人工智能），是ASI——<strong>超级人工智能</strong>。</p></article><article><h2><a href=https://www.ishareread.com/p/%E5%9B%BD%E4%BA%A7ai%E8%8A%AF%E7%89%87%E4%BB%BD%E9%A2%9D%E9%A3%99%E5%8D%87%E9%BB%84%E4%BB%81%E5%8B%8B%E9%A2%84%E8%A8%80%E8%87%AA%E5%8A%A8%E9%A9%BE%E9%A9%B6%E5%8D%81%E5%B9%B4%E6%99%AE%E5%8F%8A%E6%99%AE%E9%80%9A%E4%BA%BA%E5%A6%82%E4%BD%95%E6%8A%93%E4%BD%8Fai%E7%BA%A2%E5%88%A9/>国产AI芯片份额飙升、黄仁勋预言自动驾驶十年普及——普通人如何抓住AI红利？</a></h2><p>2026年1月的CES展会上，黄仁勋扔出了一颗"核弹"：未来十年，全球很大一部分汽车将实现自动驾驶或高度自动驾驶。他甚至预言，届时"每一辆车都会有会思考的能力，每一辆车都会由AI驱动"。</p></article></body></html>
