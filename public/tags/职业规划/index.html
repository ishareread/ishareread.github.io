<!doctype html><html><head><title>职业规划</title><meta charset=utf-8></head><body><h1>职业规划</h1><article><h2><a href=https://www.ishareread.com/p/%E8%81%8C%E5%9C%BA26%E5%B9%B4%E8%A2%AB%E4%BC%98%E5%8C%96%E5%BD%93%E4%BD%A0%E7%9A%84%E9%99%8D%E8%90%BD%E4%BC%9E%E6%98%AF%E4%BB%80%E4%B9%88%E9%A2%9C%E8%89%B2%E6%88%90%E4%B8%BA%E6%AF%8F%E4%B8%AA%E6%89%93%E5%B7%A5%E4%BA%BA%E5%BF%85%E8%AF%BB%E7%9A%84%E7%94%9F%E5%AD%98%E6%89%8B%E5%86%8C/>职场26年被优化：当《你的降落伞是什么颜色》成为每个打工人必读的生存手册</a></h2><p>上个月看到一个新闻，心里久久不是滋味。</p><p>一个在公司勤勤恳恳工作了26年的女员工，忽然收到一纸辞退通知。理由是"公司战略调整，部门优化"。26年啊，从青丝熬到白发，把最好的年华都献给了这家公司，最后换来一句轻飘飘的"优化"。</p></article><article><h2><a href=https://www.ishareread.com/p/%E6%95%99%E8%82%B2%E9%83%A8%E6%96%B0%E5%A2%9E38%E4%B8%AA%E4%B8%93%E4%B8%9A%E9%80%8F%E9%9C%B2%E4%BA%86%E4%BB%80%E4%B9%88%E5%B0%B1%E4%B8%9A%E4%BF%A1%E5%8F%B7/>教育部新增38个专业，透露了什么就业信号？</a></h2><p>朋友跟我吐槽，说他今年参加高考的表弟最近魔怔了。</p><p>每天抱着手机刷专业测评视频，看到"具身智能"就两眼放光，听说"低空经济"就赶紧记笔记，结果越看越懵——</p></article></body></html>
