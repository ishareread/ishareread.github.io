<!doctype html><html><head><title>体育竞技</title><meta charset=utf-8></head><body><h1>体育竞技</h1><article><h2><a href=https://www.ishareread.com/posts/2026-06-26-%E6%9E%81%E7%AE%80%E6%AC%A7%E6%B4%B2%E5%8F%B2-%E4%B8%96%E7%95%8C%E6%9D%AF%E6%96%87%E6%98%8E%E5%9F%BA%E5%9B%A0/>世界杯不只是踢球：从《极简欧洲史》看体育竞技背后的文明基因与文化传承</a></h2><p style=font-size:0;line-height:0;margin:0>&nbsp;</p><section style="text-align:left;line-height:1.75;font-family:-apple-system-font,BlinkMacSystemFont,Helvetica Neue,PingFang SC,Hiragino Sans GB,Microsoft YaHei UI,Microsoft YaHei,Arial,sans-serif;font-size:16px"><h1 id=0 style="text-align:center;line-height:1.75;font-family:-apple-system-font,BlinkMacSystemFont,Helvetica Neue,PingFang SC,Hiragino Sans GB,Microsoft YaHei UI,Microsoft YaHei,Arial,sans-serif;font-size:22.4px;display:table;padding:.5em 1em;border-bottom:2px solid #1aad19;margin:2em auto 1em;color:#333;font-weight:700;text-shadow:1px 1px 3px rgba(0,0,0,5%);margin-top:0" data-heading=true>世界杯不只是踢球：从《极简欧洲史》看体育竞技背后的文明基因与文化传承</h1><p style="text-align:left;line-height:1.75;font-family:-apple-system-font,BlinkMacSystemFont,Helvetica Neue,PingFang SC,Hiragino Sans GB,Microsoft YaHei UI,Microsoft YaHei,Arial,sans-serif;font-size:16px;margin:1.5em 8px;letter-spacing:.1em;color:#333">上周末，我和几个朋友约着看了一场世界杯小组赛。开场前，大家还在聊工作、聊房贷、聊孩子上学的烦恼，但当主裁判一声哨响，所有人都像变了个人似的——眼睛盯着屏幕，呼吸跟着球的轨迹起伏，进球时拍桌子欢呼，失球时懊恼得直拍大腿。</p></article></body></html>
