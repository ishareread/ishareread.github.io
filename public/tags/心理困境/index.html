<!doctype html><html><head><title>心理困境</title><meta charset=utf-8></head><body><h1>心理困境</h1><article><h2><a href=https://www.ishareread.com/posts/2026-06-26-%E8%81%8C%E5%9C%BA26%E5%B9%B4%E8%A2%AB%E4%BC%98%E5%8C%96-%E8%B6%85%E9%BE%84%E5%8A%A1%E5%B7%A5%E6%96%B0%E8%A7%84/>职场26年被"优化"、超龄务工新规7月落地：当《也许你该找个人聊聊》成为每个职场人的人生必修课</a></h2><hr><p>（全文约5000字）</p><hr><p>上个月，我一个朋友给我发来一条消息，只有六个字：&ldquo;我被优化了。&rdquo;</p><p>他今年48岁，在同一家公司工作了整整26年。从车间技术员做到生产主管，把青春全献给了那台轰鸣的机器。年前公司引进了一套智能管理系统，他的岗位被"结构性调整"了。</p></article></body></html>
