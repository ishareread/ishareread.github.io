<!doctype html><html><head><title>风险控制</title><meta charset=utf-8></head><body><h1>风险控制</h1><article><h2><a href=https://www.ishareread.com/p/%E5%B7%B4%E8%8F%B2%E7%89%B9%E9%80%80%E4%BC%91%E5%88%B7%E5%B1%8F%E4%BD%86%E5%8F%A6%E4%B8%80%E4%B8%AA%E8%80%81%E7%88%B7%E5%AD%90%E8%AF%B4%E5%B8%82%E5%9C%BA%E6%A0%B9%E6%9C%AC%E9%A2%84%E6%B5%8B%E4%B8%8D%E4%BA%86/>巴菲特退休刷屏，但另一个老爷子说：市场根本预测不了</a></h2><h1 id=巴菲特退休刷屏但另一个老爷子说市场根本预测不了>巴菲特退休刷屏，但另一个老爷子说：市场根本预测不了</h1><hr><p>2026年5月2日，美国奥马哈。</p><p>全世界的投资者都在刷同一条新闻：95岁的沃伦·巴菲特，正式从伯克希尔·哈撒韦退休了。</p><p>这一天，伯克希尔的股东大会座无虚席。95岁的巴菲特没有坐在主席台C位，而是安静地坐在第一排观众席。新任CEO格雷格·阿贝尔宣布了一件特殊的事：为巴菲特“退役”一件印着数字“60”的纪念球衣。</p></article></body></html>
