<h1>个人边界</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E4%B8%8B%E7%8F%AD%E5%90%8E%E6%B6%88%E6%81%AF%E8%BF%98%E5%9C%A8%E5%82%AC%E7%A8%8B%E5%BA%8F%E5%91%98%E7%8C%9D%E6%AD%BB%E4%BA%8B%E4%BB%B6%E8%83%8C%E5%90%8E%E8%81%8C%E5%9C%BA%E4%BA%BA%E8%AF%A5%E5%AD%A6%E4%BC%9A%E7%9A%84%E7%A6%BB%E7%BA%BF%E6%9D%83/">下班后消息还在催：程序员猝死事件背后，职场人该学会的离线权</a></h2>
<hr>
<p>周六早上，你刚把孩子送到培训班，手机震了一下——工作群里领导@了所有人：&ldquo;紧急！下午的方案需要调整，谁在线？&rdquo;</p>
<p>你本来想装作没看见，但手指已经不受控制地点开了消息。你知道，一旦回复，就意味着这个周末又泡汤了；可如果不回，明天上班等着你的可能是领导冷冰冰的眼神，甚至是绩效表上那个刺眼的&quot;态度分&quot;。</p>
