<article>
<h2><a href="https://www.ishareread.com/p/%E5%87%8C%E6%99%A8%E4%B8%89%E7%82%B9%E7%9D%A1%E4%B8%8D%E7%9D%80%E7%9A%84%E6%97%B6%E5%80%99%E4%BD%A0%E6%95%A2%E4%B8%8D%E6%95%A2%E6%89%BE%E4%B8%AA%E4%BA%BA%E8%81%8A%E8%81%8A/">凌晨三点睡不着的时候，你敢不敢找个人聊聊？</a></h2>
<p>你有没有过这种时刻？</p>
<p>加班到凌晨回家，看到厨房堆了三天的碗，突然就蹲在门口哭了。和对象吵完架明明是对方不对，你却翻来覆去失眠到三点，觉得自己是不是真的很糟糕。甚至有时候明明什么都没发生，就是胸口堵得慌，翻遍整个通讯录却找不到一个可以说话的人。</p>
