<!doctype html><html><head><title>吴军</title><meta charset=utf-8></head><body><h1>吴军</h1><article><h2><a href=https://www.ishareread.com/p/%E4%BB%8E%E7%9F%B3%E5%99%A8%E5%88%B0ai%E5%90%B4%E5%86%9B%E5%85%A8%E7%90%83%E7%A7%91%E6%8A%80%E9%80%9A%E5%8F%B2%E5%A6%82%E4%BD%95%E7%9C%8B%E6%87%82%E4%BA%BA%E7%B1%BB5000%E5%B9%B4/>从石器到AI：吴军《全球科技通史》如何看懂人类5000年</a></h2><p>你有没有想过一个问题：为什么工业革命发生在英国，而不是中国？</p><p>明朝郑和下西洋的时候，中国拥有世界上最大的舰队、最先进的航海技术。可三百年后，当蒸汽机轰鸣着驶入工业时代，中国却成了那个落后挨打的国家。</p></article></body></html>
