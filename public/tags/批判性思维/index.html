<!doctype html><html><head><title>批判性思维</title><meta charset=utf-8></head><body><h1>批判性思维</h1><article><h2><a href=https://www.ishareread.com/p/%E5%AD%A6%E4%BC%9A%E6%8F%90%E9%97%AE%E4%B8%BA%E4%BB%80%E4%B9%88ai%E6%97%B6%E4%BB%A3%E6%8F%90%E9%97%AE%E8%83%BD%E5%8A%9B%E5%8F%8D%E8%80%8C%E6%88%90%E4%BA%86%E6%A0%B8%E5%BF%83%E7%AB%9E%E4%BA%89%E5%8A%9B/>学会提问：为什么AI时代，提问能力反而成了核心竞争力？</a></h2><p>你有没有遇到过这种情况——</p><p>深夜11点，你对着ChatGPT输入了一长串问题，它噼里啪啦给你输出了三千字。你认真看完，觉得"嗯，说得挺有道理"。但转头一看老板的脸色，又觉得哪里不对。</p></article></body></html>
