<!doctype html><html><head><title>霍尔木兹</title><meta charset=utf-8></head><body><h1>霍尔木兹</h1><article><h2><a href=https://www.ishareread.com/p/%E6%B2%B9%E4%BB%B7%E6%9A%B4%E6%B6%A811%E5%90%8E%E6%9A%B4%E8%B7%8C11%E7%9C%8B%E6%87%82%E8%BF%99%E5%9C%BA%E5%81%87%E5%92%8C%E5%B9%B3%E8%83%8C%E5%90%8E%E7%9A%84%E8%83%BD%E6%BA%90%E5%8D%9A%E5%BC%88/>油价暴涨11%后暴跌11%：看懂这场假和平背后的能源博弈</a></h2><p>2026年4月，全球能源市场经历了一场过山车式的极端震荡。</p><p>4月11日，美伊两国爆发军事冲突，霍尔木兹海峡——这条承载全球1/5石油运输的"能源咽喉"——被迫关闭。国际油价应声暴涨，WTI原油单日飙升11%，布伦特原油一度逼近117美元/桶。</p></article></body></html>
