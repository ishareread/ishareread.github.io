<!doctype html><html><head><title>AI骗局</title><meta charset=utf-8></head><body><h1>AI骗局</h1><article><h2><a href=https://www.ishareread.com/posts/ai-jia-fang-wu-pian-ju-hu-ma-yao-xian-sheng-xin-li-yi-sheng/>AI假房源骗局刷屏：从《蛤蟆先生去看心理医生》看为什么我们总是被自己的情绪带进坑里</a></h2><p>昨天刷到一个新闻，气得我差点把手机摔了。</p><p>上海有5个房产中介，不知道从哪儿学的歪门邪道，用AI批量生成假房源视频。什么"地铁口、83平、精装房、只要81万"——市场价一半都不到的视频，看着那叫一个心动。结果呢？民警实地一查，那个片区二手房单价2万5到3万，根本不存在什么81万的房源。</p></article></body></html>
