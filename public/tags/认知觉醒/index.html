<h1>认知觉醒</h1>

<article>
<h2><a href="https://www.ishareread.com/p/%E6%8C%AA%E5%A8%81%E5%B0%8F%E5%AD%A6%E7%A6%81%E7%94%A8ai/">一个国家宣布小学生禁用AI：当思考变成奢侈品，我们该怎么办</a></h2>
<p>周末刷到一条新闻，我愣了好几秒。</p>
<p>挪威政府宣布：从今年8月开始，全国小学1到7年级全面禁止使用生成式AI。首相斯特勒说得更直白——学校首要任务是培养孩子的阅读、写作和数学能力，&ldquo;如果没有批判性地使用AI，孩子会跳过学习过程中的关键步骤&rdquo;。</p>
</article>

<article>
<h2><a href="https://www.ishareread.com/p/%E4%B8%BA%E4%BB%80%E4%B9%88%E8%B6%8A%E5%8A%AA%E5%8A%9B%E8%B6%8A%E7%A9%B7-%E7%A8%80%E7%BC%BA%E9%99%B7%E9%98%B1%E4%B8%8E%E8%AE%A4%E7%9F%A5%E8%A7%89%E9%86%92/">为什么越努力越穷？稀缺陷阱与认知觉醒</a></h2>
<p>说出来你可能不信，我发小阿凯，985毕业的，在上海一家互联网公司上班，月薪一万五，听着挺不错吧？</p>
<p>上个月见他，整个人瘦了一圈，黑眼圈重得像化了烟熏妆。我问他怎么了，他苦笑着说：&ldquo;天天加班到十点，周末还要随时待命，感觉身体被掏空了。&rdquo;</p>
</article>
