<!doctype html><html><head><title>投资心理</title><meta charset=utf-8></head><body><h1>投资心理</h1><article><h2><a href=https://www.ishareread.com/p/%E9%BB%84%E9%87%91%E8%BF%87%E5%B1%B1%E8%BD%A6%E4%B8%80%E5%91%A8%E6%9A%B4%E6%B6%A8170%E7%BE%8E%E5%85%83%E5%8F%88%E8%B7%8C%E5%9B%9E%E6%99%AE%E9%80%9A%E4%BA%BA%E8%AF%A5%E6%80%8E%E4%B9%88%E6%8A%95%E8%B5%84/>黄金过山车：一周暴涨170美元又跌回，普通人该怎么投资？</a></h2><p>你身边一定有这样的朋友——</p><p>4月初，看着黄金蹭蹭往上涨，4700、4800、4900……他心里痒痒的，终于在4918美元忍不住冲了进去。心想：&ldquo;这玩意儿还要涨，趁早入市！&rdquo;</p></article><article><h2><a href=https://www.ishareread.com/p/%E5%BD%93%E6%89%80%E6%9C%89%E4%BA%BA%E9%83%BD%E5%9C%A8%E6%81%90%E6%85%8C%E6%8A%9B%E5%94%AE%E7%9A%84%E6%97%B6%E5%80%99%E8%BF%993%E6%9C%AC%E4%B9%A6%E5%91%8A%E8%AF%89%E4%BD%A0%E7%9C%9F%E6%AD%A3%E8%AF%A5%E5%81%9A%E4%BB%80%E4%B9%88/>当所有人都在恐慌抛售的时候，这3本书告诉你真正该做什么</a></h2><p>4月23日，A股震荡调整，沪指失守4100点，近4100只个股飘绿。</p><p>朋友圈里，段子手们又出动了：&ldquo;上午还在讨论牛市来了，下午就开始怀念4000点以下的日子。&ldquo;收盘后，各大股票群里一片哀嚎，有人庆幸自己"果断割肉&rdquo;，有人后悔"没跑掉&rdquo;，还有人发誓"再也不碰A股了"。</p></article></body></html>
