<!doctype html><html><head><title>教育</title><meta charset=utf-8></head><body><h1>教育</h1><article><h2><a href=https://www.ishareread.com/p/%E6%8C%AA%E5%A8%81%E5%B0%8F%E5%AD%A6%E7%A6%81%E7%94%A8ai/>一个国家宣布小学生禁用AI：当思考变成奢侈品，我们该怎么办</a></h2><p>周末刷到一条新闻，我愣了好几秒。</p><p>挪威政府宣布：从今年8月开始，全国小学1到7年级全面禁止使用生成式AI。首相斯特勒说得更直白——学校首要任务是培养孩子的阅读、写作和数学能力，&ldquo;如果没有批判性地使用AI，孩子会跳过学习过程中的关键步骤&rdquo;。</p></article></body></html>
