<!DOCTYPE html>
<html>
<head>
<title>404 Page not found</title>
<meta charset="utf-8">
</head>
<body>

    <div class="not-found-card">
        <h1 class="article-title">404 错误</h1>
        <h2 class="article-subtitle">页面不存在</h2>
    </div><form action="/search/" class="search-form widget" data-json="/search/index.json">
            <p>
                <label>搜索</label>
                <input id="searchInput" name="keyword" required placeholder="输入关键词..." />
            
                <button title="搜索">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-search" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <path stroke="none" d="M0 0h24v24H0z"/>
  <circle cx="10" cy="10" r="7" />
  <line x1="21" y1="21" x2="15" y2="15" />
</svg>



                </button>
            </p>
        </form>

        <div class="search-result">
            <h3 class="search-result--title section-title"></h3>
            <div class="search-result--list article-list--compact"></div>
        </div>
        
        <script>
            window.searchResultTitleTemplate = "#PAGES_COUNT 个结果 （用时 #TIME_SECONDS 秒）"
        </script><script type="text/javascript" src="/ts/search.js" defer></script>

        <script>
            const wrongUrl = new URL(window.location.href);

            
            const searchKeyword = decodeURIComponent(wrongUrl.pathname).split(/[/|-]/).join(' ').trim();

            document.getElementById('searchInput').setAttribute('value', searchKeyword);
        </script><footer class="site-footer">

    </section>
</footer>


</body>
</html>
