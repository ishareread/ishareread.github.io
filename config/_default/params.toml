mainSections   = ["post"]
rssFullContent = false
favicon        = "img/favicon.png"

[footer]
    since  = 2026
    custom = '关注微信公众号「爱分享读书」，获取更多好书推荐'

[colorScheme]
    toggle = true
    default = "auto"

[sidebar]
    emoji    = ""
    subtitle = "用阅读拓展认知边界"
    avatar   = "img/avatar.png"

[article]
    math           = false
    readingTime    = true
    license        = { enabled = true, default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)" }

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 20 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled  = false

[opengraph]
    [opengraph.twitter]
        card = "summary_large_image"

[seo]
    image = "img/og-image.jpg"
    description = "爱分享读书 - 用阅读拓展认知边界，每周好书推荐与深度解读"

[defaultImage]
    [defaultImage.article]
        enabled = true
        local   = false
        src     = "img/default-cover.jpg"

[imageProcessing]
    [imageProcessing.cover]
        enabled = true

    [imageProcessing.content]
        enabled = false

    [imageProcessing.external]
        timeout = 30000
